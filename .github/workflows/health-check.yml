name: Health Check

on:
  schedule:
    # Cada hora
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  health:
    name: Check endpoints
    runs-on: ubuntu-latest
    # Solo activo cuando hay servidor remoto configurado
    if: vars.SERVER_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Health check web
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.SERVER_URL }}/api/health" --max-time 10)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check falló: HTTP $STATUS"
            exit 1
          else
            echo "✅ Web OK: HTTP $STATUS"
          fi

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --repo "$REPO" \
            --title "[Alerta] Health check falló — $(date '+%Y-%m-%d %H:%M')" \
            --body "El health check automático ha detectado que el servicio no responde correctamente.\n\n**URL:** ${{ vars.SERVER_URL }}/api/health\n**Fecha:** $(date -u)\n\nRevisa los logs de PM2 y el estado del servidor." \
            --label "infra" \
            || true
