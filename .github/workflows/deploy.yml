name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Modo de deploy"
        type: choice
        options:
          - full
          - quick
          - build-only
        default: full
      environment:
        description: "Entorno"
        type: choice
        options:
          - local
          - staging
          - production
        default: local

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Run tests
        run: pnpm test || true

      - name: Health check post-build
        run: |
          echo "✅ Build completado correctamente"
          echo "Rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

