version: '3.9'

services:
  app:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://user:password@db:5432/tcg_marketplace
      REDIS_URL: redis://redis:6379/0

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tcg_marketplace
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: rq worker default
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
